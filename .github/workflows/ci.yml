name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NODE_ENV: test
  PORT: 8000
  DATABASE_URL: postgresql://streamly:streamly@localhost:5432/streamly_test?schema=public
  TEST_DATABASE_URL: postgresql://streamly:streamly@localhost:5432/streamly_test?schema=public
  RUN_DATABASE_TESTS: "false"
  REDIS_ENABLED: "false"
  REDIS_URL: redis://localhost:6379
  JOBS_ENABLED: "false"
  CACHE_ENABLED: "true"
  DISABLE_RATE_LIMITING_IN_TEST: "true"
  MOCK_CLOUDINARY: "true"
  MEDIA_STORAGE_PROVIDER: cloudinary
  VIDEO_STREAMING_ENABLED: "true"
  AWS_REGION: ap-south-1
  AWS_S3_BUCKET: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_S3_PUBLIC_BASE_URL: ""
  CORS_ORIGIN: "*"
  CORS_CREDENTIALS: "true"
  TRUST_PROXY: "false"
  ACCESS_TOKEN_SECRET: ci_access_token_secret
  ACCESS_TOKEN_EXPIRY: 15m
  REFRESH_TOKEN_SECRET: ci_refresh_token_secret
  REFRESH_TOKEN_EXPIRY: 10d
  EMAIL_VERIFICATION_TOKEN_EXPIRY: 1d
  CLOUDINARY_CLOUD_NAME: ci_cloud
  CLOUDINARY_API_KEY: ci_api_key
  CLOUDINARY_API_SECRET: ci_api_secret
  API_DOCS_ENABLED: "true"
  API_DOCS_ROUTE: /api/v1/docs
  API_DOCS_SPEC_ROUTE: /api/v1/docs/openapi.json
  LOG_LEVEL: silent
  LOG_FORMAT: json
  REQUEST_ID_HEADER: x-request-id
  CORRELATION_ID_HEADER: x-correlation-id

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Syntax check
        run: npm run syntax

      - name: Smoke check
        run: npm run smoke

      - name: Verify
        run: npm run verify

      - name: Dependency audit report
        run: npm audit --audit-level=high
        continue-on-error: true

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test suite
        run: npm test

      - name: Unit tests
        run: npm run test:unit

      - name: API contract tests
        run: npm run test:api

      - name: Integration tests
        run: npm run test:integration

      - name: Coverage
        run: npm run test:coverage

  docs:
    name: OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI document
        run: npm run docs:validate

  prisma:
    name: Prisma
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker env file
        run: cp .env.docker.example .env.docker

      - name: Build Docker image
        run: docker build -t streamly-server:ci .

      - name: Validate Docker Compose config
        run: docker compose config
